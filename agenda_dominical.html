
<style>
  :root { --pepe:#2ecc71; --abdi:#e67e22; --eder:#9b59b6; --gamaliel:#34495e; }
  #agenda-root { font-family: var(--font-sans); padding: 1rem 0; }
  #agenda-root h2 { text-align: center; font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1.5rem; }
  .container { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
  .month-section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; width: 300px; }
  .month-title { border-bottom: 1px solid var(--color-border-tertiary); margin-bottom: 12px; color: var(--color-text-secondary); font-weight: 500; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 6px; }
  .class-card { border: 0.5px solid var(--color-border-tertiary); margin: 8px 0; padding: 10px; border-radius: var(--border-radius-md); display: flex; flex-direction: column; gap: 6px; background: var(--color-background-secondary); }
  .class-card.is-suspended { opacity: 0.6; }
  .card-header { display: flex; justify-content: space-between; align-items: center; }
  .date-label { font-weight: 500; color: var(--color-text-secondary); font-size: 13px; }
  .lesson-badge { background: var(--color-background-primary); color: var(--color-text-secondary); padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; border: 0.5px solid var(--color-border-tertiary); }
  .profesor-slot { min-height: 42px; background: var(--color-background-primary); border: 1.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .profesor-slot.drag-over { border-color: #3498db; background: #e3f2fd; }
  .name-tag { color: white; padding: 8px 12px; border-radius: var(--border-radius-md); cursor: grab; font-size: 13px; width: 100%; text-align: center; font-weight: 500; }
  .name-tag[data-name="Hermano Pepe"] { background-color: var(--pepe); }
  .name-tag[data-name="Hermano Abdi"] { background-color: var(--abdi); }
  .name-tag[data-name="Hermano Eder"] { background-color: var(--eder); }
  .name-tag[data-name="Hermano Gamaliel"] { background-color: var(--gamaliel); }
  .name-tag:active { cursor: grabbing; }
  .suspend-row { display: flex; align-items: center; justify-content: flex-end; }
  .suspend-btn { font-size: 11px; padding: 3px 9px; border-radius: 12px; border: 1px solid #e74c3c; background: transparent; color: #e74c3c; cursor: pointer; font-family: var(--font-sans); transition: background 0.15s, color 0.15s; }
  .suspend-btn:hover { background: #e74c3c; color: white; }
  .suspend-btn.active { background: #e74c3c; color: white; }
  .suspended-banner { background: #e74c3c; color: white; border-radius: var(--border-radius-md); text-align: center; font-size: 12px; font-weight: 500; padding: 8px; letter-spacing: 0.03em; }
  .reason-input { font-size: 11px; padding: 4px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); width: 100%; box-sizing: border-box; font-family: var(--font-sans); }
  .reason-input::placeholder { color: var(--color-text-tertiary); }
</style>

<div id="agenda-root">
  <h2>Agenda Dominical</h2>
  <div class="container" id="agenda-container"></div>
</div>

<script>
const profesores = ["Hermano Pepe","Hermano Abdi","Hermano Eder","Hermano Gamaliel"];
const mesesNombres = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function getDomingos() {
  let domingos = [], fecha = new Date(2026, 3, 12);
  while (fecha.getMonth() <= 5) { domingos.push(new Date(fecha)); fecha.setDate(fecha.getDate() + 7); }
  return domingos;
}

const domingos = getDomingos();
// Estado: para cada índice, si está suspendida y el motivo
const state = domingos.map((d, i) => ({ date: d, suspended: false, reason: '', manualProf: null }));

// Calcula qué profesor le toca a cada clase activa (respetando suspensiones y overrides manuales)
function calcProfesores() {
  let turno = 0;
  return state.map((s, i) => {
    if (s.suspended) return null;
    const prof = s.manualProf !== null ? s.manualProf : profesores[turno % profesores.length];
    // si tiene override manual no avanzamos el turno "base", pero sí el contador
    turno++;
    return prof;
  });
}

// Re-renderiza todas las tarjetas (más simple y confiable que actualizar individuales)
function renderAll() {
  const container = document.getElementById('agenda-container');
  container.innerHTML = '';
  const asignaciones = calcProfesores();
  let currentMonth = -1, monthDiv, leccionNumero = 13;

  state.forEach((s, index) => {
    if (s.date.getMonth() !== currentMonth) {
      currentMonth = s.date.getMonth();
      monthDiv = document.createElement('div');
      monthDiv.className = 'month-section';
      monthDiv.innerHTML = `<div class="month-title">${mesesNombres[currentMonth]}</div>`;
      container.appendChild(monthDiv);
    }

    const card = document.createElement('div');
    card.className = 'class-card' + (s.suspended ? ' is-suspended' : '');
    card.dataset.index = index;

    const slotHtml = s.suspended
      ? `<div class="suspended-banner">CLASE SUSPENDIDA</div>
         <input class="reason-input" type="text" placeholder="Motivo (opcional)" value="${s.reason}"
           oninput="state[${index}].reason=this.value" />`
      : `<div class="profesor-slot" ondrop="drop(event,${index})" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
           <div class="name-tag" draggable="true" ondragstart="drag(event,${index})" data-name="${asignaciones[index]}">
             ${asignaciones[index]}
           </div>
         </div>`;

    card.innerHTML = `
      <div class="card-header">
        <span class="date-label">${s.date.getDate()} ${mesesNombres[s.date.getMonth()]}</span>
        <span class="lesson-badge">Lección ${leccionNumero}</span>
      </div>
      <div class="slot-area">${slotHtml}</div>
      <div class="suspend-row">
        <button class="suspend-btn ${s.suspended ? 'active' : ''}" onclick="toggleSuspend(${index})">
          ${s.suspended ? 'Reactivar' : 'Suspender'}
        </button>
      </div>
    `;
    monthDiv.appendChild(card);
    leccionNumero++;
  });
}

function toggleSuspend(index) {
  state[index].suspended = !state[index].suspended;
  if (!state[index].suspended) state[index].manualProf = null;
  renderAll();
}

let dragSrc = null;
function drag(ev, index) {
  dragSrc = index;
  ev.dataTransfer.setData("text", String(index));
}
function allowDrop(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); }
function dragLeave(ev) { ev.currentTarget.classList.remove('drag-over'); }
function drop(ev, targetIndex) {
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  const srcIndex = parseInt(ev.dataTransfer.getData("text"));
  if (isNaN(srcIndex) || srcIndex === targetIndex) return;

  // Intercambiar los profesores manuales de ambas tarjetas
  const asignaciones = calcProfesores();
  const profSrc = asignaciones[srcIndex];
  const profTarget = asignaciones[targetIndex];
  state[srcIndex].manualProf = profTarget;
  state[targetIndex].manualProf = profSrc;
  renderAll();
}

renderAll();
</script>
